<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ISC2 Tampa Bay Chapter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-left">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      <span class="admin-title">ISC2 Tampa Bay Admin</span>
    </div>
    <div class="admin-header-right">
      <button id="publish-btn" class="btn-publish" onclick="publishSite()">Publish Site</button>
      <a href="/" class="admin-link">View Site</a>
    </div>
  </header>

  <div class="admin-layout">
    <nav class="admin-nav">
      <button class="admin-nav-btn active" data-section="presentations">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
        Presentations
      </button>
      <button class="admin-nav-btn" data-section="events">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        Events
      </button>
    </nav>

    <main class="admin-main">
      <!-- Presentations Section -->
      <section id="section-presentations" class="admin-section active">
        <div class="section-header">
          <h2>Presentations</h2>
          <button class="btn-primary" onclick="showPresentationForm()">+ Add Presentation</button>
        </div>
        <div id="presentations-list" class="item-list">
          <p class="loading">Loading...</p>
        </div>
      </section>

      <!-- Events Section -->
      <section id="section-events" class="admin-section">
        <div class="section-header">
          <h2>Events</h2>
          <button class="btn-primary" onclick="showEventForm()">+ Add Event</button>
        </div>
        <div id="events-list" class="item-list">
          <p class="loading">Loading...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Form</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
